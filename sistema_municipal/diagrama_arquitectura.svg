  <text x="40" y="28" fill="white" font-size="22" font-weight="800" letter-spacing="-0.5">🏛️  Sistema Automatizado de Gestión Documental y Selección de Currículos — ML</text>
  <text x="40" y="52" fill="rgba(255,255,255,0.65)" font-size="13">Municipalidad Provincial de Yau  ·  Arquitectura del Sistema  ·  Python + Flask + scikit-learn</text>

  <!-- ─── SECTION LABELS ───────────────────────────────────── -->
  <!-- ENTRADA -->
  <rect x="20" y="90" width="200" height="26" rx="6" fill="#e2e8f0"/>
  <text x="120" y="108" text-anchor="middle" fill="#475569" font-size="11" font-weight="700" letter-spacing="0.08em">CAPA DE ENTRADA</text>

  <!-- PROCESAMIENTO -->
  <rect x="300" y="90" width="200" height="26" rx="6" fill="#ede9fe"/>
  <text x="400" y="108" text-anchor="middle" fill="#5b21b6" font-size="11" font-weight="700" letter-spacing="0.08em">PROCESAMIENTO</text>

  <!-- ML ENGINE -->
  <rect x="560" y="90" width="200" height="26" rx="6" fill="#dbeafe"/>
  <text x="660" y="108" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="700" letter-spacing="0.08em">ML ENGINE</text>

  <!-- SALIDA -->
  <rect x="820" y="90" width="250" height="26" rx="6" fill="#dcfce7"/>
  <text x="945" y="108" text-anchor="middle" fill="#14532d" font-size="11" font-weight="700" letter-spacing="0.08em">RESULTADOS Y ALERTAS</text>

  <!-- ═══════════════════════════════════════════════════════
       FLUJO 1: TRÁMITES
  ════════════════════════════════════════════════════════ -->

  <!-- Label flujo tramites -->
  <text x="40" y="158" fill="#1e40af" font-size="13" font-weight="800">📄  FLUJO 1 — GESTIÓN DE TRÁMITES</text>
  <line x1="40" y1="163" x2="1060" y2="163" stroke="#bfdbfe" stroke-width="1.5"/>

  <!-- BOX 1: Usuario / Documento -->
  <rect x="24" y="178" width="172" height="90" rx="14" fill="white" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="24" y="178" width="172" height="8" rx="7" fill="#0f2444"/>
  <rect x="24" y="182" width="172" height="4" fill="#0f2444"/>
  <text x="110" y="222" text-anchor="middle" fill="#0f172a" font-size="22">📋</text>
  <text x="110" y="243" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Documento Trámite</text>
  <text x="110" y="258" text-anchor="middle" fill="#64748b" font-size="10">JPG / PNG / PDF</text>

  <!-- ARROW 1→2 -->
  <line x1="196" y1="223" x2="262" y2="223" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="229" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">upload</text>

  <!-- BOX 2: OCR Module -->
  <rect x="264" y="178" width="180" height="90" rx="14" fill="white" filter="url(#shadow)" stroke="#bae6fd" stroke-width="2"/>
  <rect x="264" y="178" width="180" height="8" rx="7" fill="url(#ocrGrad)"/>
  <rect x="264" y="182" width="180" height="4" fill="url(#ocrGrad)"/>
  <text x="354" y="215" text-anchor="middle" fill="#0369a1" font-size="20">🔍</text>
  <text x="354" y="235" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">OCR Processor</text>
  <text x="354" y="250" text-anchor="middle" fill="#64748b" font-size="10">pytesseract + OpenCV</text>
  <text x="354" y="263" text-anchor="middle" fill="#64748b" font-size="10">Preprocesamiento imagen</text>

  <!-- ARROW 2→3 -->
  <line x1="444" y1="223" x2="520" y2="223" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="482" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">texto OCR</text>

  <!-- BOX 3: Clasificador -->
  <rect x="522" y="178" width="196" height="90" rx="14" fill="white" filter="url(#shadow)" stroke="#c4b5fd" stroke-width="2"/>
  <rect x="522" y="178" width="196" height="8" rx="7" fill="url(#mlGrad)"/>
  <rect x="522" y="182" width="196" height="4" fill="url(#mlGrad)"/>
  <text x="620" y="213" text-anchor="middle" fill="#5b21b6" font-size="18">🤖</text>
  <text x="620" y="232" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">ClasificadorTramites</text>
  <text x="620" y="248" text-anchor="middle" fill="#64748b" font-size="10">TF-IDF Vectorizer</text>
  <text x="620" y="262" text-anchor="middle" fill="#64748b" font-size="10">Random Forest Classifier</text>

  <!-- ARROW 3→4 -->
  <line x1="718" y1="223" x2="800" y2="223" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="759" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">prioridad + tipo</text>

  <!-- BOX 4: Cola Priorizada -->
  <rect x="802" y="178" width="268" height="90" rx="14" fill="white" filter="url(#shadow)" stroke="#bbf7d0" stroke-width="2"/>
  <rect x="802" y="178" width="268" height="8" rx="7" fill="url(#tramGrad)"/>
  <rect x="802" y="182" width="268" height="4" fill="url(#tramGrad)"/>
  <text x="936" y="213" text-anchor="middle" fill="#047857" font-size="18">📊</text>
  <text x="936" y="232" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Cola Priorizada + Alertas</text>
