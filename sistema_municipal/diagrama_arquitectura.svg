       FLUJO 2: CURRÍCULOS
  ════════════════════════════════════════════════════════ -->

  <text x="40" y="318" fill="#c2410c" font-size="13" font-weight="800">👤  FLUJO 2 — SELECCIÓN DE CURRÍCULOS</text>
  <line x1="40" y1="323" x2="1060" y2="323" stroke="#fed7aa" stroke-width="1.5"/>

  <!-- BOX A: CV -->
  <rect x="24" y="338" width="172" height="90" rx="14" fill="white" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="24" y="338" width="172" height="8" rx="7" fill="#0f2444"/>
  <rect x="24" y="342" width="172" height="4" fill="#0f2444"/>
  <text x="110" y="382" text-anchor="middle" fill="#0f172a" font-size="22">👤</text>
  <text x="110" y="403" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Currículo Vitae</text>
  <text x="110" y="418" text-anchor="middle" fill="#64748b" font-size="10">Foto / Escaneado / PDF</text>

  <!-- ARROW A→B -->
  <line x1="196" y1="383" x2="262" y2="383" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="229" y="378" text-anchor="middle" fill="#94a3b8" font-size="9">upload</text>

  <!-- BOX B: OCR (same) -->
  <rect x="264" y="338" width="180" height="90" rx="14" fill="white" filter="url(#shadow)" stroke="#bae6fd" stroke-width="2"/>
  <rect x="264" y="338" width="180" height="8" rx="7" fill="url(#ocrGrad)"/>
  <rect x="264" y="342" width="180" height="4" fill="url(#ocrGrad)"/>
  <text x="354" y="375" text-anchor="middle" fill="#0369a1" font-size="20">🔍</text>
  <text x="354" y="395" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">OCR Processor</text>
  <text x="354" y="410" text-anchor="middle" fill="#64748b" font-size="10">pytesseract + OpenCV</text>
  <text x="354" y="423" text-anchor="middle" fill="#64748b" font-size="10">Extracción de texto CV</text>

  <!-- ARROW B→C -->
  <line x1="444" y1="383" x2="520" y2="383" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="482" y="378" text-anchor="middle" fill="#94a3b8" font-size="9">texto CV</text>

  <!-- BOX C: SelectorCV -->
  <rect x="522" y="338" width="196" height="90" rx="14" fill="white" filter="url(#shadow)" stroke="#fed7aa" stroke-width="2"/>
  <rect x="522" y="338" width="196" height="8" rx="7" fill="url(#cvGrad)"/>
  <rect x="522" y="342" width="196" height="4" fill="url(#cvGrad)"/>
  <text x="620" y="373" text-anchor="middle" fill="#9a3412" font-size="18">⚖️</text>
  <text x="620" y="392" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">SelectorCV</text>
  <text x="620" y="408" text-anchor="middle" fill="#64748b" font-size="10">Feature Extraction (Regex/NLP)</text>
  <text x="620" y="422" text-anchor="middle" fill="#64748b" font-size="10">Scoring Ponderado + Ranking</text>

  <!-- ARROW C→D -->
  <line x1="718" y1="383" x2="800" y2="383" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="759" y="378" text-anchor="middle" fill="#94a3b8" font-size="9">puntaje + ranking</text>

  <!-- BOX D: Ranking -->
  <rect x="802" y="338" width="268" height="90" rx="14" fill="white" filter="url(#shadow)" stroke="#fed7aa" stroke-width="2"/>
  <rect x="802" y="338" width="268" height="8" rx="7" fill="url(#cvGrad)"/>
  <rect x="802" y="342" width="268" height="4" fill="url(#cvGrad)"/>
  <text x="936" y="373" text-anchor="middle" fill="#9a3412" font-size="18">🏆</text>
  <text x="936" y="392" text-anchor="middle" fill="#0f172a" font-size="12" font-weight="700">Ranking de Candidatos</text>
  <text x="820" y="413" fill="#64748b" font-size="10">1°  Ana García ——————— 87 pts  EXCELENTE</text>
  <text x="820" y="425" fill="#64748b" font-size="10">2°  Juan Torres ——————— 74 pts  MUY BUENO</text>

  <!-- ═══════════════════════════════════════════════════════
       ARQUITECTURA TÉCNICA
  ════════════════════════════════════════════════════════ -->

  <text x="40" y="478" fill="#374151" font-size="13" font-weight="800">🏗️  ARQUITECTURA TÉCNICA DEL SISTEMA</text>
  <line x1="40" y1="483" x2="1060" y2="483" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Flask Web Server -->
  <rect x="24" y="498" width="240" height="120" rx="14" fill="white" filter="url(#shadow)" stroke="#bfdbfe" stroke-width="2"/>
  <rect x="24" y="498" width="240" height="30" rx="7" fill="#1e40af"/>
  <rect x="24" y="515" width="240" height="13" fill="#1e40af"/>
  <text x="144" y="519" text-anchor="middle" fill="white" font-size="12" font-weight="700">🌐  Flask Web Server</text>
  <text x="40" y="548" fill="#374151" font-size="10.5" font-weight="600">GET  /</text>
  <text x="40" y="563" fill="#374151" font-size="10.5">POST /api/tramite/procesar</text>
  <text x="40" y="578" fill="#374151" font-size="10.5">GET  /api/tramite/cola</text>
  <text x="40" y="593" fill="#374151" font-size="10.5">POST /api/cv/evaluar</text>
  <text x="40" y="608" fill="#374151" font-size="10.5">GET  /api/cv/ranking</text>

  <!-- OCR Module detail -->
  <rect x="290" y="498" width="230" height="120" rx="14" fill="white" filter="url(#shadow)" stroke="#bae6fd" stroke-width="2"/>
  <rect x="290" y="498" width="230" height="30" rx="7" fill="url(#ocrGrad)"/>
  <rect x="290" y="515" width="230" height="13" fill="url(#ocrGrad)"/>
  <text x="405" y="519" text-anchor="middle" fill="white" font-size="12" font-weight="700">🔍  ocr_processor.py</text>
  <text x="306" y="548" fill="#374151" font-size="10.5">• cv2.cvtColor → Escala de grises</text>
  <text x="306" y="563" fill="#374151" font-size="10.5">• GaussianBlur → Reduce ruido</text>
  <text x="306" y="578" fill="#374151" font-size="10.5">• adaptiveThreshold → Binariza</text>
  <text x="306" y="593" fill="#374151" font-size="10.5">• pytesseract → Extrae texto</text>
  <text x="306" y="608" fill="#374151" font-size="10.5">• Idioma: Español (spa)</text>

  <!-- Clasificador detail -->
  <rect x="556" y="498" width="230" height="120" rx="14" fill="white" filter="url(#shadow)" stroke="#c4b5fd" stroke-width="2"/>
  <rect x="556" y="498" width="230" height="30" rx="7" fill="url(#mlGrad)"/>
  <rect x="556" y="515" width="230" height="13" fill="url(#mlGrad)"/>
  <text x="671" y="519" text-anchor="middle" fill="white" font-size="12" font-weight="700">🤖  clasificador_tramites.py</text>
  <text x="572" y="548" fill="#374151" font-size="10.5">• TfidfVectorizer (ngram 1-2)</text>
  <text x="572" y="563" fill="#374151" font-size="10.5">• RandomForestClassifier (n=200)</text>
  <text x="572" y="578" fill="#374151" font-size="10.5">• class_weight='balanced'</text>
  <text x="572" y="593" fill="#374151" font-size="10.5">• Labels: CRÍTICO/ALTO/MEDIO/BAJO</text>
  <text x="572" y="608" fill="#374151" font-size="10.5">• joblib → persistencia del modelo</text>

  <!-- SelectorCV detail -->
  <rect x="822" y="498" width="248" height="120" rx="14" fill="white" filter="url(#shadow)" stroke="#fed7aa" stroke-width="2"/>
  <rect x="822" y="498" width="248" height="30" rx="7" fill="url(#cvGrad)"/>
  <rect x="822" y="515" width="248" height="13" fill="url(#cvGrad)"/>
  <text x="946" y="519" text-anchor="middle" fill="white" font-size="12" font-weight="700">⚖️  selector_cvs.py</text>
  <text x="838" y="548" fill="#374151" font-size="10.5">• Educación     → peso 30%</text>
  <text x="838" y="563" fill="#374151" font-size="10.5">• Experiencia   → peso 25%</text>
  <text x="838" y="578" fill="#374151" font-size="10.5">• Habilidades   → peso 20%</text>
  <text x="838" y="593" fill="#374151" font-size="10.5">• Certificaciones→ peso 15%</text>
  <text x="838" y="608" fill="#374151" font-size="10.5">• Idiomas       → peso 10%</text>

  <!-- ─── TECH STACK ─────────────────────────────────────── -->
  <text x="40" y="652" fill="#374151" font-size="13" font-weight="800">📦  STACK TECNOLÓGICO</text>
  <line x1="40" y1="657" x2="1060" y2="657" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Tech pills -->
  <rect x="24"  y="668" width="110" height="30" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
