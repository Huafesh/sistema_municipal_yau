  <rect x="386" y="668" width="136" height="30" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="454" y="688" text-anchor="middle" fill="#0369a1" font-size="11" font-weight="700">🔍 pytesseract</text>

  <rect x="534" y="668" width="118" height="30" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="593" y="688" text-anchor="middle" fill="#166534" font-size="11" font-weight="700">👁 OpenCV</text>

  <rect x="664" y="668" width="118" height="30" rx="8" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="723" y="688" text-anchor="middle" fill="#7e22ce" font-size="11" font-weight="700">🧮 TF-IDF + RF</text>

  <rect x="794" y="668" width="100" height="30" rx="8" fill="#fff1f1" stroke="#fecaca" stroke-width="1.5"/>
  <text x="844" y="688" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="700">💾 joblib</text>

  <rect x="906" y="668" width="158" height="30" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="985" y="688" text-anchor="middle" fill="#854d0e" font-size="11" font-weight="700">📊 pandas / numpy</text>

  <!-- ─── FLUJO ALERT ────────────────────────────────────── -->
  <!-- Alert connector from BOX4 down -->
  <line x1="936" y1="268" x2="936" y2="300" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="820" y="300" width="230" height="32" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
