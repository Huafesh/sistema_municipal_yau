  <rect x="146" y="668" width="90"  height="30" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="191" y="688" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="700">🌶 Flask 3.0</text>

  <rect x="248" y="668" width="126" height="30" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
