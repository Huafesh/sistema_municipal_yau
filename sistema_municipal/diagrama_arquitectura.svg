  <text x="550" y="750" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">SENATI · Taller de Desarrollo de Aplicaciones con Machine Learning · Municipalidad Provincial de Yau</text>
  <text x="550" y="768" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="9">Flujo 1: OCR → TF-IDF + Random Forest → Priorización  |  Flujo 2: OCR → Feature Extraction → Scoring Ponderado → Ranking</text>
</svg>
