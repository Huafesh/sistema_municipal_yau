  <text x="846" y="261" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="700">⚡ CRÍTICO</text>
  <rect x="880" y="248" width="42" height="18" rx="9" fill="#fff8f1" stroke="#fed7aa" stroke-width="1"/>
  <text x="901" y="261" text-anchor="middle" fill="#9a3412" font-size="9" font-weight="700">🔺 ALTO</text>
  <rect x="930" y="248" width="44" height="18" rx="9" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="952" y="261" text-anchor="middle" fill="#854d0e" font-size="9" font-weight="700">📋 MEDIO</text>
  <rect x="982" y="248" width="38" height="18" rx="9" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="1001" y="261" text-anchor="middle" fill="#166534" font-size="9" font-weight="700">✅ BAJO</text>

